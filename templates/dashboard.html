<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Example site</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f1117;
            color: #e1e4e8;
            min-height: 100vh;
        }
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            background: #161b22;
            border-bottom: 1px solid #30363d;
        }
        nav .brand { font-weight: 700; font-size: 1.2rem; color: #f0f6fc; }
        nav .user { color: #8b949e; }
        nav a {
            color: #58a6ff;
            text-decoration: none;
            margin-left: 1.5rem;
        }
        nav a:hover { text-decoration: underline; }
        .content {
            max-width: 800px;
            margin: 3rem auto;
            padding: 0 2rem;
        }
        h1 { font-size: 1.8rem; margin-bottom: 1rem; color: #f0f6fc; }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .card h2 { font-size: 1.1rem; margin-bottom: 0.5rem; color: #f0f6fc; }
        .card p { color: #8b949e; line-height: 1.5; }
    </style>
</head>
<body>
    <nav>
        <span class="brand">Example site</span>
        <div>
            <span class="user">{{.Email}}</span>
            <a href="/logout">Sign Out</a>
        </div>
    </nav>
    <div class="content">
        <h1>Dashboard</h1>
        <div class="card">
            <h2>Welcome</h2>
            <p>You are authenticated as <strong>{{.Email}}</strong> via SAML SSO.</p>
        </div>
        <div class="card">
            <h2>SSO Status</h2>
            <p>Your session is active. You can access linked applications without signing in again while the IdP session remains valid.</p>
        </div>
    </div>
</body>
</html>
