# SAML Service Provider site — self-contained.
# Place the IdP public certificate as certs/idp.crt (copy from IdP volume or export).
services:
  website:
    build: .
    ports:
      - "127.0.0.1:8081:80"
    env_file:
      - .env
    environment:
      SITE_SESSION_KEY: ${SITE_SESSION_KEY}
      SP_ENTITY_ID: ${SP_ENTITY_ID:-https://cybeross.ru}
      SP_ACS_URL: ${SP_ACS_URL:-https://cybeross.ru/saml/acs}
      IDP_SSO_URL: ${IDP_SSO_URL:-https://idp.cybeross.ru/sso}
      IDP_CERT_PATH: /app/certs/idp.crt
      LISTEN_ADDR: ":80"
    volumes:
      - ./certs:/app/certs:ro
    restart: unless-stopped
